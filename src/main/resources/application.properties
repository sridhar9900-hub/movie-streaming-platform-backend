# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/myflixhub?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT — must be at least 32 characters (256 bits)
app.jwt.secret=myflixhub1234567890abcdefghijklmnopqrstuvwxyz123456
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.myflixhub=DEBUG
logging.level.org.springframework.security=INFO